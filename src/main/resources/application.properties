server.port=8080
spring.profiles.active=prod
# MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/blog
spring.datasource.username=root
spring.datasource.password=root

#mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# AuthController:/auth/register
auth.register-enabled=true

#debug=true

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
# Expiry Time, unit ms
# 300000ms = 5min
spring.cache.redis.time-to-live=300000

# my config
spring.config.import=optional:file:./config/ContentScan/contentScan.yml

logging.file.name=./logs/blogCore.log
logging.level.root=INFO
spring.mvc.async.request-timeout=120000

# aliyun OSS
## OSS BASIC
aliyun.oss.endpoint=https://oss-cn-chengdu.aliyuncs.com
aliyun.oss.bucket=maiyihe-blog-figures
## environment variable
aliyun.oss.accessKeyId=test
aliyun.oss.accessKeySecret=test

# Python FastApi
rag.python.url=http://localhost:8001
rag.chat.daily-limit=30
rag.chat.limit-enabled=true
rag.chat.qps-enabled=true
rag.chat.qps-interval-ms=1000
